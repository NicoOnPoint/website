<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Redirectar till ny sida...</title>

    <!-- Meta redirect (voor de meeste browsers) -->
    <meta http-equiv="refresh" content="0; url=/sv/index.html">

    <!-- Canonical URL (voor SEO) -->
    <link rel="canonical" href="https://nico-on-point-services.com/sv/index.html">

    <!-- Kleine extra: voorkom dat zoekmachines deze oude URL als hoofdversie zien -->
    <meta name="robots" content="noindex">

    <!-- Fallback JavaScript redirect -->
    <script>
        window.location.replace("/sv/index.html");
    </script>

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top, rgba(255, 216, 77, 0.14), rgba(255, 216, 77, 0) 38%),
                linear-gradient(180deg, #1b1b1b, #121212 55%, #101010);
            color: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #1a1a1a;
            padding: 2rem 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 216, 77, 0.24);
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
        }
        p {
            margin: 0.25rem 0;
        }
        a {
            color: #e7cf78;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
        .small {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Vi skickar dig vidare 🚚</h1>
        <p>Den svenska sidan finns nu på en ny adress.</p>
        <p>
            Om du inte omdirigeras automatiskt,<br>
            klicka här:
            <br>
            <a href="/sv/index.html">Gå till nico-on-point-services.com/sv/index.html</a>
        </p>
        <p class="small">Den här länken finns kvar för gamla bokmärken och länkar.</p>
    </div>
</body>
</html>
